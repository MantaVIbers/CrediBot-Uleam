# CrediBot API — Cloud Run (referencia)
# Ajusta project/region/service vía variables en GitHub Actions.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: creditbot-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/creditbot/creditbot-api:latest
          ports:
            - name: http1
              containerPort: 8000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: WHATSAPP_PROVIDER
              value: twilio
            # Secretos: configurar en Cloud Run / Secret Manager
            # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, OPENAI_API_KEY,
            # TWILIO_*, META_*, REDIS_URL, APP_PUBLIC_URL
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
