name: Deploy Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "creditbot/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE: creditbot-api
  REPOSITORY: creditbot
  IMAGE_NAME: creditbot-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Activa con Actions variable ENABLE_CLOUD_RUN_DEPLOY=true y secretos GCP_*.
    if: ${{ vars.ENABLE_CLOUD_RUN_DEPLOY == 'true' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve region/service
        run: |
          echo "REGION=${{ vars.GCP_REGION }}" >> "$GITHUB_ENV"
          echo "SERVICE=${{ vars.CLOUD_RUN_SERVICE }}" >> "$GITHUB_ENV"
          echo "REPOSITORY=${{ vars.ARTIFACT_REPO }}" >> "$GITHUB_ENV"
          if [ -z "${{ vars.GCP_REGION }}" ]; then echo "REGION=us-central1" >> "$GITHUB_ENV"; fi
          if [ -z "${{ vars.CLOUD_RUN_SERVICE }}" ]; then echo "SERVICE=creditbot-api" >> "$GITHUB_ENV"; fi
          if [ -z "${{ vars.ARTIFACT_REPO }}" ]; then echo "REPOSITORY=creditbot" >> "$GITHUB_ENV"; fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        working-directory: creditbot
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          TAG="${IMAGE}:${GITHUB_SHA}"
          LATEST="${IMAGE}:latest"
          docker build -t "${TAG}" -t "${LATEST}" .
          docker push "${TAG}"
          docker push "${LATEST}"
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --image "${{ env.IMAGE_TAG }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 3 \
            --min-instances 0 \
            --set-env-vars "APP_ENV=production,APP_DEBUG=false" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --format='value(status.url)'
